name: Release Build Check

# リリースは v1/Cargo.toml の version 変更を起点に v<version> タグを切って走る
# （auto-release.yml。リリース対象はまだ v1/ に退避された旧実装）。タグ後の
# リリースビルドは 4 プラットフォーム（Linux / macOS amd64・arm64 / Windows）を
# 対象にするが、通常の Test ワークフローは ubuntu-latest でしかビルドしないため、
# Windows 固有のコンパイルエラーがタグを切るまで検出できない。
#
# そこで v1 の version（とロックファイル）が変わる PR ＝「タグが変わる PR」で、
# release.yml と同じターゲット行列で v1 を release ビルドして、リリースが成功する
# ことをマージ前に検証する。
on:
  pull_request:
    branches: [ "main" ]
    paths:
      - "v1/Cargo.toml"
      - "v1/Cargo.lock"

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Release build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
          cache-on-failure: true
          workspaces: v1

      - name: Build binary
        run: cargo +stable build --release --target ${{ matrix.target }} --manifest-path v1/Cargo.toml
