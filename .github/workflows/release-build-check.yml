name: Release Build Check

# リリースは Cargo.toml の version 変更を起点に v<version> タグを切って走る
# （auto-release.yml）。タグ後のリリースビルドは 4 プラットフォーム
# （Linux / macOS amd64・arm64 / Windows）を対象にするが、通常の Test ワークフロー
# は ubuntu-latest でしかビルドしないため、Windows 固有のコンパイルエラーがタグを
# 切るまで検出できない。
#
# そこで version（とロックファイル）が変わる PR ＝「タグが変わる PR」で、
# release.yml と同じターゲット行列を release ビルドして、リリースが成功することを
# マージ前に検証する。
on:
  pull_request:
    branches: [ "main" ]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Release build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
          cache-on-failure: true

      - name: Build binary
        run: cargo build --release --target ${{ matrix.target }}
