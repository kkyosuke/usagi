name: Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

concurrency:
  group: test-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@nightly
      with:
        components: rustfmt, clippy

    - name: Rust Cache
      uses: swatinem/rust-cache@v2
      with:
        cache-on-failure: true
        shared-key: rust-lint

    - name: Check formatting
      run: cargo fmt --all -- --check

    - name: Clippy
      run: cargo clippy --workspace --all-targets -- -D warnings

  full-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@nightly

    - name: Rust Cache
      uses: swatinem/rust-cache@v2
      with:
        cache-on-failure: true
        shared-key: rust-full-test

    - name: Run tests
      run: |
        set +e
        cargo test --workspace --quiet > /tmp/usagi-cargo-test.log 2>&1
        status=$?
        set -e
        tail -n 160 /tmp/usagi-cargo-test.log
        exit "$status"

    - name: Test recommended-test selector
      run: bash scripts/tests/recommend-tests.sh

    - name: Test nextest JUnit summarizer
      run: bash scripts/tests/summarize-nextest-junit.sh

    - name: Test coverage report comment generator
      run: bash scripts/tests/coverage-report-comment.sh

    - name: Test coverage(off) policy linter
      run: bash scripts/tests/coverage-off-lint.sh

    - name: Enforce coverage(off) registry
      run: ruby scripts/coverage-off-lint.rb

    - name: Test v1 release-version detector
      run: bash scripts/tests/v1-version-changed.sh

    - name: Test verified installer transaction
      run: bash scripts/tests/install.sh

    - name: Test release verification artifacts
      run: bash scripts/tests/release-verification-artifacts.sh
