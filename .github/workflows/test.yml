name: Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

concurrency:
  group: test-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  SCCACHE_CACHE_SIZE: 2G
  SCCACHE_DIR: ${{ github.workspace }}/.usagi/cache/sccache-ci
  SCCACHE_IDLE_TIMEOUT: 0
  RUSTC_WRAPPER: sccache

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy

    - name: Capture Rust toolchain cache key
      id: rust-toolchain-cache-key
      run: echo "rustc_hash=$(rustc -Vv | sha256sum | cut -d ' ' -f1)" >> "$GITHUB_OUTPUT"

    - name: Install sccache
      uses: taiki-e/install-action@sccache

    - name: Cache sccache objects
      uses: actions/cache@v4
      with:
        path: ${{ env.SCCACHE_DIR }}
        key: sccache-${{ runner.os }}-${{ steps.rust-toolchain-cache-key.outputs.rustc_hash }}-test-lint-${{ hashFiles('Cargo.lock') }}
        restore-keys: |
          sccache-${{ runner.os }}-${{ steps.rust-toolchain-cache-key.outputs.rustc_hash }}-test-lint-

    - name: Rust Cache
      uses: swatinem/rust-cache@v2
      with:
        cache-on-failure: true
        shared-key: rust-lint

    - name: Check formatting
      run: cargo fmt --all -- --check

    - name: Clippy
      run: cargo clippy --all-targets -- -D warnings

    - name: Show sccache stats
      if: always()
      run: |
        sccache --show-stats
        sccache --stop-server || true

  full-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Capture Rust toolchain cache key
      id: rust-toolchain-cache-key
      run: echo "rustc_hash=$(rustc -Vv | sha256sum | cut -d ' ' -f1)" >> "$GITHUB_OUTPUT"

    - name: Install sccache
      uses: taiki-e/install-action@sccache

    - name: Cache sccache objects
      uses: actions/cache@v4
      with:
        path: ${{ env.SCCACHE_DIR }}
        key: sccache-${{ runner.os }}-${{ steps.rust-toolchain-cache-key.outputs.rustc_hash }}-test-full-test-${{ hashFiles('Cargo.lock') }}
        restore-keys: |
          sccache-${{ runner.os }}-${{ steps.rust-toolchain-cache-key.outputs.rustc_hash }}-test-full-test-

    - name: Rust Cache
      uses: swatinem/rust-cache@v2
      with:
        cache-on-failure: true
        shared-key: rust-full-test

    - name: Run tests
      run: cargo test --quiet

    - name: Test recommended-test selector
      run: bash scripts/tests/recommend-tests.sh

    - name: Test nextest JUnit summarizer
      run: bash scripts/tests/summarize-nextest-junit.sh

    - name: Show sccache stats
      if: always()
      run: |
        sccache --show-stats
        sccache --stop-server || true
