name: Test metrics

on:
  schedule:
    - cron: "17 18 * * 1"
  workflow_dispatch:

concurrency:
  group: test-metrics-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  nextest-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          shared-key: rust-test-metrics

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Run full suite three times
        run: |
          mkdir -p test-metrics
          status=0
          for attempt in 1 2 3; do
            if ! cargo nextest run --profile metrics --workspace --no-fail-fast; then
              status=1
            fi
            mv target/nextest/metrics/junit.xml "test-metrics/junit-${attempt}.xml"
          done
          exit "$status"

      - name: Summarize slow tests and variance
        if: always()
        run: ruby scripts/summarize-nextest-junit.rb test-metrics/junit-*.xml | tee test-metrics/summary.md

      - name: Upload duration reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nextest-duration-${{ github.run_id }}
          path: test-metrics/
          retention-days: 90
