name: Coverage

on:
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  pull-requests: write

env:
  CARGO_TERM_COLOR: always
  # 対象から外す端末 I/O 専用の薄いラッパ（テスト不能なため計測しない）。
  COVERAGE_IGNORE: '(src/main\.rs|cli/hop\.rs|tui/home/mod\.rs|tui/new/mod\.rs)'
  # 100% を要求するカバレッジ指標。
  COVERAGE_MIN: 100

jobs:
  coverage:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        components: llvm-tools-preview

    - name: Rust Cache
      uses: swatinem/rust-cache@v2
      with:
        cache-on-failure: true

    - name: Install cargo-llvm-cov
      uses: taiki-e/install-action@cargo-llvm-cov

    - name: Run tests with coverage
      run: cargo llvm-cov --workspace --lcov --output-path lcov.info --ignore-filename-regex "$COVERAGE_IGNORE"

    - name: Generate coverage summary
      if: always()
      run: |
        report=$(cargo llvm-cov report --summary-only --ignore-filename-regex "$COVERAGE_IGNORE")
        total=$(echo "$report" | awk '/^TOTAL/ { print $10 }')

        # Lines カバレッジが100%に満たないファイルをMarkdownテーブルの行に整形する。
        # Lines のカバレッジ帯に応じて信号機の絵文字を付ける。
        rows=$(echo "$report" | awk '
          function emoji(c,   v) {
            v = c; sub(/%/, "", v); v = v + 0
            if (v >= 90) return "🟢"
            else if (v >= 70) return "🟡"
            else return "🔴"
          }
          /^Filename/ || /^-+$/ || /^TOTAL/ { next }
          {
            if ($10 != "100.00%") {
              printf "| `%s` | %s | %s | %s %s |\n", $1, $4, $7, emoji($10), $10
            }
          }
        ')

        total_row=$(echo "$report" | awk '/^TOTAL/ { printf "| **🧮 合計** | **%s** | **%s** | **%s** |", $4, $7, $10 }')

        {
          echo "## 📊 Test Coverage"
          echo ""
          echo "> 🎯 **全体カバレッジ (Lines): ${total}**"
          if [ -z "$rows" ]; then
            echo ">"
            echo "> 🎉 すべてのファイルが Lines カバレッジ100%です！"
          else
            echo ">"
            echo "> 100% に届いていないファイルだけピックアップしました 👇"
            echo ""
            echo "| 📄 ファイル | 🌐 Regions | 🔧 Functions | 📈 Lines |"
            echo "| :--- | ---: | ---: | ---: |"
            echo "$rows"
            echo "$total_row"
          fi
        } > coverage-comment.md

    - name: Comment coverage on PR
      if: always()
      uses: marocchino/sticky-pull-request-comment@v2
      with:
        header: coverage
        recreate: true
        path: coverage-comment.md

    - name: Enforce 100% coverage
      run: |
        cargo llvm-cov report \
          --ignore-filename-regex "$COVERAGE_IGNORE" \
          --fail-under-lines "$COVERAGE_MIN" \
          --fail-under-functions "$COVERAGE_MIN"
