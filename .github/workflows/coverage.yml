name: Coverage

on:
  pull_request:
    branches: [ "main" ]

concurrency:
  group: coverage-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

env:
  CARGO_TERM_COLOR: always
  SCCACHE_CACHE_SIZE: 2G
  SCCACHE_DIR: ${{ github.workspace }}/.usagi/cache/sccache-ci
  SCCACHE_IDLE_TIMEOUT: 0
  RUSTC_WRAPPER: sccache

jobs:
  coverage:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    # 除外条件・閾値は SSoT (scripts/coverage.sh) を lefthook と共有する。
    - name: Load coverage config (SSoT)
      run: |
        . ./scripts/coverage.sh
        echo "COVERAGE_IGNORE=$COVERAGE_IGNORE" >> "$GITHUB_ENV"
        echo "COVERAGE_MIN=$COVERAGE_MIN" >> "$GITHUB_ENV"

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        components: llvm-tools-preview

    - name: Capture Rust toolchain cache key
      id: rust-toolchain-cache-key
      run: echo "rustc_hash=$(rustc -Vv | sha256sum | cut -d ' ' -f1)" >> "$GITHUB_OUTPUT"

    - name: Install sccache
      uses: taiki-e/install-action@sccache

    - name: Cache sccache objects
      uses: actions/cache@v4
      with:
        path: ${{ env.SCCACHE_DIR }}
        key: sccache-${{ runner.os }}-${{ steps.rust-toolchain-cache-key.outputs.rustc_hash }}-coverage-coverage-${{ hashFiles('Cargo.lock') }}
        restore-keys: |
          sccache-${{ runner.os }}-${{ steps.rust-toolchain-cache-key.outputs.rustc_hash }}-coverage-coverage-

    - name: Rust Cache
      uses: swatinem/rust-cache@v2
      with:
        cache-on-failure: true

    - name: Install cargo-llvm-cov
      uses: taiki-e/install-action@cargo-llvm-cov

    - name: Run tests with coverage
      run: cargo llvm-cov --workspace --lcov --output-path lcov.info --ignore-filename-regex "$COVERAGE_IGNORE"

    - name: Show sccache stats
      if: always()
      run: |
        sccache --show-stats
        sccache --stop-server || true

    - name: Generate coverage summary
      if: always()
      run: |
        report=$(cargo llvm-cov report --summary-only --ignore-filename-regex "$COVERAGE_IGNORE")
        total=$(echo "$report" | awk '/^TOTAL/ { print $10 }')

        # Lines カバレッジが100%に満たないファイルをMarkdownテーブルの行に整形する。
        # Lines のカバレッジ帯に応じて信号機の絵文字を付ける。
        rows=$(echo "$report" | awk '
          function emoji(c,   v) {
            v = c; sub(/%/, "", v); v = v + 0
            if (v >= 90) return "🟢"
            else if (v >= 70) return "🟡"
            else return "🔴"
          }
          /^Filename/ || /^-+$/ || /^TOTAL/ { next }
          {
            if ($10 != "100.00%") {
              printf "| `%s` | %s | %s | %s %s |\n", $1, $4, $7, emoji($10), $10
            }
          }
        ')

        total_row=$(echo "$report" | awk '/^TOTAL/ { printf "| **🧮 合計** | **%s** | **%s** | **%s** |", $4, $7, $10 }')

        {
          echo "## 📊 Test Coverage"
          echo ""
          echo "> 🚀 **いまのカバレッジ (Lines): ${total}** — この調子でいこう！"
          echo ""
          if [ -z "$rows" ]; then
            echo "🎉✨ パーフェクト！全ファイル Lines カバレッジ 100% を達成しました 🏆🐰"
          else
            echo "100% に届いていないファイルだけピックアップしました 👇"
            echo ""
            echo "| 📄 ファイル | 🌐 Regions | 🔧 Functions | 📈 Lines |"
            echo "| :--- | ---: | ---: | ---: |"
            echo "$rows"
            echo "$total_row"
          fi
        } > coverage-comment.md

    - name: Comment coverage on PR
      if: always()
      uses: marocchino/sticky-pull-request-comment@v2
      with:
        header: coverage
        recreate: true
        path: coverage-comment.md

    - name: Enforce 100% coverage
      run: |
        cargo llvm-cov report \
          --ignore-filename-regex "$COVERAGE_IGNORE" \
          --fail-under-lines "$COVERAGE_MIN" \
          --fail-under-functions "$COVERAGE_MIN"
