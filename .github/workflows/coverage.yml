name: Coverage

on:
  pull_request:
    branches: [ "main" ]

concurrency:
  group: coverage-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

env:
  CARGO_TERM_COLOR: always

jobs:
  coverage:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    # exclusion lint と閾値は scripts/coverage.sh を SSoT とする。
    - name: Load coverage config (SSoT)
      run: |
        . ./scripts/coverage.sh
        echo "COVERAGE_MIN=$COVERAGE_MIN" >> "$GITHUB_ENV"

    - name: Enforce coverage(off) policy
      run: |
        . ./scripts/coverage.sh
        coverage_off_lint

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@nightly
      with:
        components: llvm-tools-preview

    - name: Rust Cache
      uses: swatinem/rust-cache@v2
      with:
        cache-on-failure: true

    - name: Install cargo-llvm-cov
      uses: taiki-e/install-action@cargo-llvm-cov

    - name: Run tests with coverage
      run: cargo llvm-cov --workspace --lcov --output-path lcov.info

    # 未達ファイル/関数/行のレポート生成は scripts/coverage-report-comment.rb に
    # 抽出済み（fixture test: scripts/tests/coverage-report-comment.sh）。入力は
    # `cargo llvm-cov report --json`（gate と同じ集計。lcov の per-monomorphization な
    # 関数レコードと違い、マージ済み関数カバレッジで gate と一致する）。関数名は
    # c++filt（binutils。ubuntu-latest に同梱）で Rust v0 を demangle する。
    # lcov.info が生成されていれば coverage の合否に関わらず（always）レポートを作り、
    # PR コメントと Job Summary の両方へ出す。Job Summary は権限不要のため fork PR でも
    # 必ず一覧が見える。compile/test 失敗で lcov.info が無い場合はここを skip する
    # （その場合は上の Run tests step が既に job を落としている）。
    - name: Generate coverage report
      if: always() && hashFiles('lcov.info') != ''
      run: |
        . ./scripts/coverage.sh
        coverage_report --json > coverage.json
        ruby scripts/coverage-report-comment.rb coverage.json > coverage-comment.md
        cat coverage-comment.md >> "$GITHUB_STEP_SUMMARY"

    # PR コメントは同一リポジトリの PR に限定する。fork PR は token が read-only に
    # 降格されコメントできないため Job Summary にフォールバックする。continue-on-error で
    # コメント投稿の失敗が coverage gate（下の Enforce step の exit code）に波及しないようにする。
    # header + recreate で同一 PR の再実行でもコメントを重複させず 1 件に更新する。
    - name: Comment coverage on PR
      if: >-
        always() && hashFiles('lcov.info') != '' &&
        github.event.pull_request.head.repo.full_name == github.repository
      continue-on-error: true
      uses: marocchino/sticky-pull-request-comment@v2
      with:
        header: coverage
        recreate: true
        path: coverage-comment.md

    # coverage gate の合否を決める唯一の step。レポート/コメントの後に always で走らせ、
    # 100% 未満なら job を落とす（レポートは既に出力済み）。
    - name: Enforce 100% coverage
      if: always() && hashFiles('lcov.info') != ''
      run: |
        . ./scripts/coverage.sh
        coverage_report \
          --fail-under-lines "$COVERAGE_MIN" \
          --fail-under-functions "$COVERAGE_MIN"
