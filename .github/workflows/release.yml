name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and Release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: usagi
            asset_name: usagi-linux-amd64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: usagi
            asset_name: usagi-macos-amd64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: usagi
            asset_name: usagi-macos-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: usagi.exe
            asset_name: usagi-windows-amd64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
          cache-on-failure: true

      - name: Build binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare artifact
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          mkdir -p dist
          cp ${{ matrix.artifact_name }} dist/
          cp ../../../scripts/install.sh dist/
          chmod +x dist/install.sh
          cd dist
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            ASSET_FILENAME="${{ matrix.asset_name }}.zip"
            7z a ../../../../$ASSET_FILENAME *
            echo "ASSET_FILENAME=$ASSET_FILENAME" >> $GITHUB_ENV
          else
            ASSET_FILENAME="${{ matrix.asset_name }}.tar.gz"
            tar -czvf ../../../../$ASSET_FILENAME .
            echo "ASSET_FILENAME=$ASSET_FILENAME" >> $GITHUB_ENV
          fi

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ASSET_FILENAME }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
