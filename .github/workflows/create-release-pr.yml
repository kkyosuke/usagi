name: Create Release PR

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'New release version (e.g., 2.5.0)'
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  create-release-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Update version in Cargo.toml
        run: |
          sed -i -e "0,/^version = \".*\"/{s/^version = \".*\"/version = \"${{ inputs.version }}\"/}" Cargo.toml

          cargo check --workspace --all-targets

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: bump version to ${{ inputs.version }}"
          title: "Release v${{ inputs.version }}"
          body: |
            Bump version to `${{ inputs.version }}` for the next release.
            
            > [!NOTE]
            > Merging this PR will trigger the \`Auto Release on Version Bump\` workflow to automatically create the release tag and publish the artifacts.
          branch: "release/v${{ inputs.version }}"
          base: main
