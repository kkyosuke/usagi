name: Create Release PR

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'New release version (e.g., 2.5.0)'
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  create-release-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Update version in v1/Cargo.toml
        run: |
          # リリース対象はまだ v1（v1/ に退避された旧実装）のため、
          # v1/Cargo.toml の最初の version = "..." を入力されたバージョンで上書き
          sed -i -e "0,/^version = \".*\"/{s/^version = \".*\"/version = \"${{ inputs.version }}\"/}" v1/Cargo.toml

          # v1/Cargo.lock も更新
          cargo check --manifest-path v1/Cargo.toml

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: bump version to ${{ inputs.version }}"
          title: "Release v${{ inputs.version }}"
          body: |
            Bump version to `${{ inputs.version }}` for the next release.
            
            > [!NOTE]
            > Merging this PR will trigger the \`Auto Release on Version Bump\` workflow to automatically create the release tag and publish the artifacts.
          branch: "release/v${{ inputs.version }}"
          base: main
