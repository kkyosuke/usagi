# Git hooks 管理 (https://lefthook.dev)
#
# セットアップ:
#   brew install lefthook   # または: npm i -g lefthook / go install github.com/evilmartians/lefthook@latest
#   lefthook install
#
# ルール:
#   - ブランチ名: main または <type>/<説明>  (type: feat|fix|docs|refactor|perf|test|build|ci|chore)
#                 ※ usagi のセッション worktree (.usagi/sessions/<name>/) はブランチ名が usagi/<name> になるため対象外
#   - コミットメッセージ: Conventional Commits (例: feat: 〇〇を追加 / fix(cli): 〇〇を修正)
#   - コミット時に staged な .rs ファイルを自動フォーマット
#   - push 時に clippy を確認
#     ※ 全件テスト・カバレッジ100%は時間がかかりすぎるため pre-push では走らせない。
#       テスト・カバレッジ100%の確認は Coverage CI (.github/workflows/coverage.yml) が担う。

pre-commit:
  parallel: true
  commands:
    branch-name:
      run: |
        branch=$(git symbolic-ref --short HEAD 2>/dev/null || echo detached)
        # usagi のセッション worktree (.usagi/sessions/<name>/) はブランチ名が usagi/<name> になり、
        # usagi は許可された type ではない (04-orchestration.md) ため <type>/<説明> を満たせない。
        # セッション内のコミットは命名規則チェックの対象外とする。
        toplevel=$(git rev-parse --show-toplevel 2>/dev/null || echo .)
        case "$toplevel" in
          */.usagi/sessions/*) exit 0 ;;
        esac
        pattern='^(main|(feat|fix|docs|refactor|perf|test|build|ci|chore)/[a-z0-9][a-z0-9._/-]*)$'
        if ! echo "$branch" | grep -qE "$pattern"; then
          echo "✗ ブランチ名 '$branch' が命名規則に従っていません" >&2
          echo "  形式: <type>/<説明>  (type: feat|fix|docs|refactor|perf|test|build|ci|chore)" >&2
          echo "  例:   feat/add-doctor-command" >&2
          echo "  変更: git branch -m <新しい名前>" >&2
          exit 1
        fi
    fmt:
      glob: "*.rs"
      run: cargo fmt -- {staged_files}
      stage_fixed: true

commit-msg:
  commands:
    lint-message:
      run: |
        subject=$(head -n1 {1})
        # マージコミット・revert・fixup はそのまま許可
        if echo "$subject" | grep -qE '^(Merge |Revert |fixup! |squash! )'; then
          exit 0
        fi
        pattern='^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\([a-z0-9_-]+\))?!?: .+'
        if ! echo "$subject" | grep -qE "$pattern"; then
          echo "✗ コミットメッセージが Conventional Commits 形式ではありません" >&2
          echo "  形式: <type>[(scope)][!]: <説明>" >&2
          echo "  type: feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert" >&2
          echo "  例:   feat: doctor コマンドを追加" >&2
          echo "        fix(cli): 引数解析のエラーを修正" >&2
          echo "  実際: $subject" >&2
          exit 1
        fi

pre-push:
  parallel: true
  commands:
    clippy:
      run: cargo clippy --all-targets -- -D warnings
      # 全件テスト・カバレッジ100% (cargo llvm-cov) は時間がかかりすぎるため pre-push では走らせない。
      # その確認は Coverage CI (.github/workflows/coverage.yml) に委ねる。
      # 開発中の反復では変更箇所のテストだけを絞って回す (.agents/workflow.md ステップ2)。
