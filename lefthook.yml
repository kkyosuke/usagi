# Git hooks 管理 (https://lefthook.dev)
#
# セットアップ:
#   brew install lefthook   # または: npm i -g lefthook / go install github.com/evilmartians/lefthook@latest
#   lefthook install
#
# ルール:
#   - workspace root (= .usagi/sessions/ 配下でないチェックアウト) からの実装コミットを拒否する backstop。
#                 「変更は必ず session」を守るための安価な最終防壁 (一次防壁は MCP 書き込み拒否 / guard-workspace)。
#   - ブランチ名: main または <type>/<説明>  (type: feat|fix|docs|refactor|perf|test|build|ci|chore)
#                 ※ usagi のセッション worktree (.usagi/sessions/<name>/) はブランチ名が usagi/<name> になるため対象外
#   - コミットメッセージ: Conventional Commits (例: feat: 〇〇を追加 / fix(cli): 〇〇を修正)
#   - コミット時に staged な .rs ファイルを自動フォーマット
#
# push 時のローカル重い full gate (workspace clippy / カバレッジ100%) は持たない。
# clippy / full test / coverage 100% の最終 gate は PR CI (test.yml / coverage.yml) に一本化する。
# 開発中は fast feedback (cargo fmt --check / cargo check / 変更箇所の selected tests) を回し、
# PR は Draft で開いて CI 成功後に Ready for review とする (正本: document/06-conventions.md)。

pre-commit:
  parallel: true
  commands:
    guard-root:
      run: |
        # backstop: 「変更は必ず session」を守る安価な最終防壁。
        # 一次防壁は MCP 書き込み拒否 (#106) と guard-workspace root モード (#107) だが、
        # フックが差し込まれない経路 (人手のコミット・別ツール) での root コミットは素通しするため、
        # ここでも workspace root (= .usagi/sessions/ 配下でない) からのコミットを拒否する。
        toplevel=$(git rev-parse --show-toplevel 2>/dev/null || echo .)
        # session worktree (.usagi/sessions/<name>/) のコミットは従来どおり通す。
        case "$toplevel" in
          */.usagi/sessions/*) exit 0 ;;
        esac
        # usagi 管理ワークスペース (root に .usagi/ を持つ) 以外は対象外。
        # usagi をライブラリとして使うだけの一般リポジトリの root コミットまでは妨げない。
        if [ ! -d "$toplevel/.usagi" ]; then
          exit 0
        fi
        echo "✗ workspace root で直接コミットしようとしています" >&2
        echo "  usagi では変更は必ず session (.usagi/sessions/<name>/) 内で行います。" >&2
        echo "  root/コーディネータは issue の定義・delegate のみを行い、実装コミットはしません。" >&2
        echo "  → session を作成 (usagi session create / MCP session_create) し、その worktree でコミットしてください。" >&2
        echo "  緊急時のみ: LEFTHOOK=0 git commit ... または --no-verify (原則使わない)" >&2
        exit 1
    branch-name:
      run: |
        branch=$(git symbolic-ref --short HEAD 2>/dev/null || echo detached)
        # usagi のセッション worktree (.usagi/sessions/<name>/) はブランチ名が usagi/<name> になり、
        # usagi は許可された type ではない (04-orchestration.md) ため <type>/<説明> を満たせない。
        # セッション内のコミットは命名規則チェックの対象外とする。
        toplevel=$(git rev-parse --show-toplevel 2>/dev/null || echo .)
        case "$toplevel" in
          */.usagi/sessions/*) exit 0 ;;
        esac
        pattern='^(main|(feat|fix|docs|refactor|perf|test|build|ci|chore)/[a-z0-9][a-z0-9._/-]*)$'
        if ! echo "$branch" | grep -qE "$pattern"; then
          echo "✗ ブランチ名 '$branch' が命名規則に従っていません" >&2
          echo "  形式: <type>/<説明>  (type: feat|fix|docs|refactor|perf|test|build|ci|chore)" >&2
          echo "  例:   feat/add-doctor-command" >&2
          echo "  変更: git branch -m <新しい名前>" >&2
          exit 1
        fi
    fmt:
      glob: "*.rs"
      # v1/ は退避された旧実装（edition 2021 の独立プロジェクト）のため、
      # ルート（edition 2024）の rustfmt にかけない（edition 2024 では `gen` が
      # 予約語になるなど、パース自体が成立しない）。
      exclude: '^v1/'
      run: |
        files=$(printf '%s\n' {staged_files} | grep -v '^v1/' || true)
        if [ -n "$files" ]; then
          # shellcheck disable=SC2086
          cargo fmt -- $files
        fi
      stage_fixed: true

commit-msg:
  commands:
    lint-message:
      run: |
        subject=$(head -n1 {1})
        # マージコミット・revert・fixup はそのまま許可
        if echo "$subject" | grep -qE '^(Merge |Revert |fixup! |squash! )'; then
          exit 0
        fi
        pattern='^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\([a-z0-9_-]+\))?!?: .+'
        if ! echo "$subject" | grep -qE "$pattern"; then
          echo "✗ コミットメッセージが Conventional Commits 形式ではありません" >&2
          echo "  形式: <type>[(scope)][!]: <説明>" >&2
          echo "  type: feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert" >&2
          echo "  例:   feat: doctor コマンドを追加" >&2
          echo "        fix(cli): 引数解析のエラーを修正" >&2
          echo "  実際: $subject" >&2
          exit 1
        fi

# pre-push フックは持たない。
# clippy / full test / coverage 100% の最終 gate は PR CI (test.yml / coverage.yml) に一本化した。
# ローカルでの検証は開発中の fast feedback と commit 前の selected tests で行う
# (正本: document/06-conventions.md#品質チェックリスク比例の-gate)。
