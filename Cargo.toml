[package]
name = "usagi"
version = "0.1.0"
edition = "2021"
repository = "https://github.com/KKyosuke/usagi"
license = "MIT"

[dependencies]
clap = { version = "4.5", features = ["derive"] }
anyhow = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
chrono = { version = "0.4", features = ["serde"] }
dirs = "6.0"
console = "0.15"
notify-rust = "4.11"

[dev-dependencies]
tempfile = "3"
