[package]
name = "usagi"
version = "0.1.0"
edition = "2021"
repository = "https://github.com/KKyosuke/usagi"
license = "MIT"

[dependencies]
clap = { version = "4.5", features = ["derive"] }
anyhow = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
chrono = { version = "0.4", features = ["serde"] }
dirs = "6.0"
console = "0.15"
notify-rust = "4.11"
portable-pty = "0.9.0"
vt100 = "0.16.2"
crossterm = "0.29.0"
rayon = "1.12.0"

[target.'cfg(unix)'.dependencies]
libc = "0.2"

[dev-dependencies]
tempfile = "3"
